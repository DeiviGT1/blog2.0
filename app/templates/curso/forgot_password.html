{% extends "curso/base_curso.html" %}
{% block title %}Recuperar contraseña — Excel 365{% endblock %}

{% block content %}
<main class="curso-main curso-main--narrow" style="padding-top:3rem;">
  <div class="auth-card">
    <h1>Recuperar contraseña</h1>
    <p class="subtitle">Ingresa tu correo y te enviaremos un enlace para crear una nueva contraseña.</p>

    <form method="POST" action="{{ url_for('curso.forgot_password') }}">
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" placeholder="tu@email.com"
               required autocomplete="email" />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Enviar enlace</button>
    </form>

    <div class="auth-footer">
      <a href="{{ url_for('curso.login') }}">← Volver al inicio de sesión</a>
    </div>
  </div>
</main>
{% endblock %}
