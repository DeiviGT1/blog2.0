{% extends "curso/base_curso.html" %}
{% block title %}Nueva contraseña — Excel 365{% endblock %}

{% block content %}
<main class="curso-main curso-main--narrow" style="padding-top:3rem;">
  <div class="auth-card">
    <h1>Nueva contraseña</h1>
    <p class="subtitle">Elige una contraseña segura de al menos 8 caracteres.</p>

    <form method="POST" action="{{ url_for('curso.reset_password') }}">
      <div class="form-group">
        <label for="password">Nueva contraseña</label>
        <input type="password" id="password" name="password"
               placeholder="Mínimo 8 caracteres" required minlength="8"
               autocomplete="new-password" />
      </div>
      <div class="form-group">
        <label for="confirm">Confirmar contraseña</label>
        <input type="password" id="confirm" name="confirm"
               placeholder="Repite tu contraseña" required minlength="8"
               autocomplete="new-password" />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Guardar contraseña</button>
    </form>
  </div>
</main>
{% endblock %}
