{% extends "curso/base_curso.html" %}
{% block title %}Iniciar sesión — Excel 365{% endblock %}

{% block content %}
<main class="curso-main curso-main--narrow" style="padding-top:3rem;">
  <div class="auth-card">
    <h1>Bienvenido de vuelta</h1>
    <p class="subtitle">Inicia sesión para acceder a tu curso.</p>

    <form method="POST" action="{{ url_for('curso.login') }}">
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" placeholder="tu@email.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Iniciar sesión</button>
    </form>

    <div class="divider"><span>o continúa con</span></div>
    <a href="{{ url_for('curso.auth_google') }}" class="btn-google">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Continuar con Google
    </a>

    <div class="auth-footer">
      ¿No tienes cuenta? <a href="{{ url_for('curso.register') }}">Regístrate aquí</a>
    </div>
  </div>
</main>
{% endblock %}
