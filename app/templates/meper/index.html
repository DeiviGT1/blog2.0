<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¿Me perdonas?</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper:     #F4ECDA;
      --paper-2:   #FAF3E2;
      --card:      #FBF4E3;
      --ink:       #2A1F17;
      --ink-soft:  #5C4A3A;
      --ink-muted: #8E7B68;
      --line:      rgba(42, 31, 23, 0.16);
      --accent:    #A93F3A;

      --serif: 'Fraunces', Georgia, serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--serif);
      color: var(--ink);
      background: var(--paper);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      line-height: 1.55;
      font-size: clamp(15px, 1.3vw, 17px);
      -webkit-font-smoothing: antialiased;
    }

    /* Very subtle grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.28;
      background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.2 0 0 0 0 0.13 0 0 0 0 0.09 0 0 0 0.3 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
      mix-blend-mode: multiply;
    }

    /* Container */
    .letter {
      position: relative;
      z-index: 10;
      max-width: 980px;
      margin: 0 auto;
      padding: clamp(28px, 4vw, 56px) clamp(20px, 5vw, 72px);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Stage */
    .stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      padding: clamp(40px, 8vw, 80px) 0;
    }

    .scene {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      animation: sceneIn 0.6s ease both;
    }
    .scene[data-active] { display: flex; }

    /* opacity-only — must NOT use transform, otherwise position:fixed on
       descendants becomes relative to .scene instead of the viewport */
    @keyframes sceneIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Headline */
    .headline {
      font-family: var(--serif);
      font-size: clamp(54px, 9vw, 128px);
      font-weight: 500;
      line-height: 1.02;
      letter-spacing: -0.02em;
      color: var(--ink);
      font-variation-settings: "opsz" 144;
    }

    .sub {
      font-family: var(--serif);
      font-style: italic;
      font-weight: 400;
      font-size: clamp(16px, 1.6vw, 19px);
      color: var(--ink-soft);
      max-width: 460px;
      margin: 24px auto 0;
      line-height: 1.5;
    }

    /* Actions */
    .actions {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 48px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      font-family: var(--serif);
      font-size: clamp(14px, 1.2vw, 15px);
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 18px 38px;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.3s ease, background 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .btn-yes {
      color: var(--paper);
      background: var(--ink);
      border: 1.5px solid var(--ink);
      box-shadow: 0 6px 20px rgba(42, 31, 23, 0.18);
    }
    .btn-yes:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 32px rgba(42, 31, 23, 0.24);
    }
    .btn-yes:active { transform: translateY(0); }

    .btn-no {
      color: var(--ink);
      background: transparent;
      border: 1.5px solid var(--ink);
      transition: transform 0.45s cubic-bezier(0.5, -0.3, 0.5, 1.5),
                  background 0.3s ease, color 0.3s ease;
      will-change: transform;
    }

    /* Shared escape behavior — used by NO button and the empanada card */
    .escaping {
      position: fixed !important;
      z-index: 999;
      margin: 0 !important;
      transition: left 0.3s cubic-bezier(0.3, 0.7, 0.3, 1),
                  top  0.3s cubic-bezier(0.3, 0.7, 0.3, 1);
    }
    .menu-card.escaping {
      max-width: min(220px, calc(100vw - 40px)) !important;
      width: max-content;
      padding: 14px 18px !important;
      font-size: 13px !important;
      line-height: 1.3 !important;
    }

    /* Scene 2 — menu */
    .scene-title {
      font-family: var(--serif);
      font-size: clamp(36px, 5.5vw, 72px);
      font-weight: 500;
      line-height: 1.05;
      letter-spacing: -0.015em;
      color: var(--ink);
      font-variation-settings: "opsz" 96;
    }

    .menu-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(16px, 2.5vw, 28px);
      max-width: 760px;
      width: 100%;
      margin-top: 48px;
    }

    .menu-card {
      font-family: var(--serif);
      font-size: clamp(15px, 1.5vw, 18px);
      font-weight: 500;
      line-height: 1.35;
      color: var(--ink);
      background: var(--card);
      border: 1px solid var(--line);
      padding: clamp(22px, 2.8vw, 34px) clamp(18px, 2.4vw, 28px);
      cursor: pointer;
      text-align: center;
      border-radius: 4px;
      transition: transform 0.4s cubic-bezier(0.2, 0.7, 0.2, 1),
                  box-shadow 0.4s ease,
                  border-color 0.4s ease;
    }
    .menu-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 36px rgba(42, 31, 23, 0.12);
      border-color: var(--ink-soft);
    }

    /* Scene 3 — reveal */
    .frame {
      max-width: 420px;
      width: 100%;
      background: var(--paper-2);
      padding: 14px;
      border: 1px solid var(--line);
      box-shadow: 0 20px 50px rgba(42, 31, 23, 0.16);
      margin-top: 16px;
    }
    .frame img {
      width: 100%;
      display: block;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: #E8DCC2;
    }

    .reveal-actions {
      display: flex;
      gap: 14px;
      margin-top: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-ghost {
      font-family: var(--serif);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-soft);
      background: transparent;
      border: 1px solid var(--line);
      padding: 12px 24px;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }
    .btn-ghost:hover {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }

    /* Footer */
    .letter__footer {
      padding-top: 24px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .letter__footer p {
      font-family: var(--serif);
      font-size: 12px;
      color: var(--ink-muted);
      font-style: italic;
      letter-spacing: 0.04em;
    }
    .letter__footer a {
      color: var(--ink-soft);
      text-decoration: none;
      border-bottom: 1px dotted var(--ink-muted);
    }
    .letter__footer a:hover { color: var(--ink); }

    /* Responsive */
    @media (max-width: 720px) {
      .menu-cards { grid-template-columns: 1fr; gap: 14px; }
      .headline { font-size: clamp(48px, 14vw, 84px); }
      .scene-title { font-size: clamp(32px, 8.5vw, 52px); }
      .actions { gap: 12px; }
      .btn { padding: 16px 28px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <main class="letter">

    <div class="stage">

      <!-- Scene 1 -->
      <section class="scene" data-scene="ask" data-active>
        <h1 class="headline">Meper🍩🍩?</h1>
        <div class="actions">
          <button class="btn btn-yes" data-action="yes">Sí</button>
          <button class="btn btn-no"  data-action="no">No</button>
        </div>
      </section>

      <!-- Scene 2 -->
      <section class="scene" data-scene="menu">
        <h2 class="scene-title">Método de reconciliación</h2>
        <div class="menu-cards">
          <button class="menu-card" data-action="meme">¿Polvito de reconciliación? 🍅</button>
          <button class="menu-card" data-action="empanada">¿Empanadas de reconciliación? 🥟</button>
        </div>
      </section>

      <!-- Scene 3 -->
      <section class="scene" data-scene="reveal">
        <div class="frame">
          <img id="reveal-img" alt="" src="" />
        </div>
        <div class="reveal-actions">
          <button class="btn-ghost" data-action="again">otra</button>
          <button class="btn-ghost" data-action="restart">volver</button>
        </div>
      </section>

    </div>

    <footer class="letter__footer">
      <p>hecho con cariño por <a href="https://jdavidgonzalez.netlify.app/" target="_blank" rel="noopener">JDavidG</a></p>
    </footer>

  </main>

  <script>
    (function () {
      const IMG_BASE     = "{{ url_for('static', filename='images/meper/') }}";
      const TOTAL_IMAGES = 8;

      const scenes = {
        ask:    document.querySelector('[data-scene="ask"]'),
        menu:   document.querySelector('[data-scene="menu"]'),
        reveal: document.querySelector('[data-scene="reveal"]')
      };

      const revealImg = document.getElementById('reveal-img');
      let lastIndex = -1;

      function show(name) {
        Object.values(scenes).forEach(s => s.removeAttribute('data-active'));
        scenes[name].setAttribute('data-active', '');
        scenes[name].style.animation = 'none';
        // eslint-disable-next-line no-unused-expressions
        scenes[name].offsetWidth;
        scenes[name].style.animation = '';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function pickImage() {
        let i = Math.floor(Math.random() * TOTAL_IMAGES);
        if (TOTAL_IMAGES > 1) {
          while (i === lastIndex) {
            i = Math.floor(Math.random() * TOTAL_IMAGES);
          }
        }
        lastIndex = i;
        revealImg.src = IMG_BASE + i + '.png';
      }

      let imagesPreloaded = false;
      function preloadImages() {
        if (imagesPreloaded) return;
        imagesPreloaded = true;
        for (let i = 0; i < TOTAL_IMAGES; i++) {
          const img = new Image();
          img.src = IMG_BASE + i + '.png';
        }
      }

      // Viewport size — innerWidth/innerHeight matches position:fixed's coordinate space
      function viewport() {
        return {
          w: window.innerWidth  || document.documentElement.clientWidth,
          h: window.innerHeight || document.documentElement.clientHeight
        };
      }

      const MARGIN = 16;

      function escapeMove(el) {
        // Apply .escaping first so size caps (e.g. menu-card max-width) take effect,
        // then force a synchronous layout so we measure the *new* dimensions.
        el.classList.add('escaping');
        // eslint-disable-next-line no-unused-expressions
        el.offsetHeight;

        const vp   = viewport();
        const rect = el.getBoundingClientRect();
        const bw   = Math.min(rect.width,  vp.w - MARGIN * 2);
        const bh   = Math.min(rect.height, vp.h - MARGIN * 2);

        const slotX = Math.max(0, vp.w - bw - MARGIN * 2);
        const slotY = Math.max(0, vp.h - bh - MARGIN * 2);
        const x = MARGIN + Math.random() * slotX;
        const y = MARGIN + Math.random() * slotY;

        el.style.left = x + 'px';
        el.style.top  = y + 'px';
      }

      function clampWithin(el) {
        if (!el.classList.contains('escaping')) return;
        const vp   = viewport();
        const rect = el.getBoundingClientRect();
        const bw   = Math.min(rect.width,  vp.w - MARGIN * 2);
        const bh   = Math.min(rect.height, vp.h - MARGIN * 2);
        let x = parseFloat(el.style.left);
        let y = parseFloat(el.style.top);
        if (isNaN(x)) x = MARGIN;
        if (isNaN(y)) y = MARGIN;
        x = Math.max(MARGIN, Math.min(vp.w - bw - MARGIN, x));
        y = Math.max(MARGIN, Math.min(vp.h - bh - MARGIN, y));
        el.style.left = x + 'px';
        el.style.top  = y + 'px';
      }

      function resetEscape(el) {
        el.classList.remove('escaping');
        el.style.left = '';
        el.style.top  = '';
      }

      function bindEscape(el, isArmed) {
        isArmed = isArmed || (() => true);
        const fire = (e) => {
          if (!isArmed()) return;
          if (e && e.preventDefault) e.preventDefault();
          escapeMove(el);
        };
        el.addEventListener('mouseenter', fire);
        el.addEventListener('touchstart', fire, { passive: false });
        el.addEventListener('click',      fire);
      }

      // NO — escapes
      const noBtn = document.querySelector('[data-action="no"]');
      bindEscape(noBtn);

      // Empanadas — starts in place, then escapes once a short grace period passes
      // (avoids escaping the very instant scene 2 appears if the cursor is over it)
      const empanadaCard = document.querySelector('[data-action="empanada"]');
      let empanadaArmed = false;
      bindEscape(empanadaCard, () => empanadaArmed);

      // SI — switch to menu and arm empanada after a small delay
      document.querySelector('[data-action="yes"]').addEventListener('click', (e) => {
        e.preventDefault();
        preloadImages();
        empanadaArmed = false;
        show('menu');
        setTimeout(() => { empanadaArmed = true; }, 450);
      });

      // Polvito — the only valid choice
      document.querySelector('[data-action="meme"]').addEventListener('click', () => {
        pickImage();
        show('reveal');
      });

      // Reveal actions
      document.querySelector('[data-action="again"]').addEventListener('click', pickImage);

      document.querySelector('[data-action="restart"]').addEventListener('click', () => {
        resetEscape(noBtn);
        resetEscape(empanadaCard);
        empanadaArmed = false;
        show('ask');
      });

      // Keep escaping elements inside the viewport when resized / rotated / zoomed
      function reclampAll() {
        document.querySelectorAll('.escaping').forEach(clampWithin);
      }
      window.addEventListener('resize', reclampAll);
      window.addEventListener('orientationchange', reclampAll);
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', reclampAll);
        window.visualViewport.addEventListener('scroll', reclampAll);
      }
    })();
  </script>
</body>
</html>
